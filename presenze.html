<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Presenze Divisione — Settimana</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121826; --panel2:#0f1522;
    --text:#e6edf3; --muted:#9fb0c0; --line:#223044;
    --m-bar:#1f6feb; --p-bar:#f6c26a; --a-bar:#ff6b6b;
    --ok:#2ecc71;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
  header{ padding:12px 16px; border-bottom:1px solid var(--line); display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
  h1{ font-size:16px; margin:0; font-weight:800; letter-spacing:.3px; }
  .muted{ color:var(--muted); }
  .small{ font-size:12px; }
  button,select,input{ background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:7px 10px; font-size:13px; }
  button{ cursor:pointer; }
  button:hover{ border-color:#30445f; }
  button.ghost{ background:transparent; }
  button.primary{ background:rgba(31,111,235,.18); border-color:rgba(31,111,235,.55); }
  button.danger{ background:#3a1115; border-color:#6b1a22; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .weeknav{ display:flex; align-items:center; gap:10px; }
  .weeknav .wklabel{ font-weight:800; font-size:13px; min-width:240px; text-align:center; line-height:1.25; }

  /* ===== Week strip (tutti i giorni) ===== */
  .week{ display:flex; gap:10px; overflow-x:auto; padding:12px 16px 26px; align-items:flex-start; }
  .day{ flex:1 0 215px; min-width:215px; max-width:340px; border:1px solid var(--line); border-radius:14px; background:var(--panel); display:flex; flex-direction:column; overflow:hidden; }
  .day.today{ box-shadow:0 0 0 2px rgba(46,204,113,.45); }

  /* colonna weekend collassabile */
  .weekendWrap{ display:flex; align-items:stretch; gap:10px; flex:0 0 auto; }
  .weekendWrap .handle{ writing-mode:vertical-rl; text-orientation:mixed; cursor:pointer; user-select:none;
    background:rgba(46,160,67,.15); border:1px solid var(--line); border-radius:12px; padding:10px 7px;
    font-weight:800; font-size:12px; letter-spacing:.5px; color:#7ee2a0; display:flex; align-items:center; justify-content:center; white-space:nowrap; }
  .weekendWrap .handle:hover{ background:rgba(46,160,67,.28); }
  .weekendWrap .wkndDays{ display:flex; gap:10px; }
  .weekendWrap.collapsed .wkndDays{ display:none; }
  .dayHead{ padding:9px 10px; text-align:center; border-bottom:1px solid var(--line); background:rgba(255,255,255,.03); }
  .dayHead .dow{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
  .dayHead .dnum{ font-weight:900; font-size:14px; }
  .dayBody{ display:flex; flex-direction:column; gap:8px; padding:8px; }

  .shift{ border:1px solid var(--line); border-radius:11px; overflow:hidden; }
  .shiftHead{ padding:6px 9px; font-weight:900; font-size:11px; letter-spacing:.7px; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
  .shift.morning   .shiftHead{ background:var(--m-bar); color:#fff; }
  .shift.afternoon .shiftHead{ background:var(--p-bar); color:#1b1300; }
  .shift.absent    .shiftHead{ background:var(--a-bar); color:#330000; }
  .shift.work .shiftHead{ background:#2ea043; color:#fff; }
  .shift.home .shiftHead{ background:#39424f; color:#cfd8e3; }
  .day.weekend .dayHead{ background:rgba(46,160,67,.12); }
  .day.weekend .dayHead .dow{ color:#7ee2a0; }
  .shiftHead .n{ font-size:11px; opacity:.9; }
  .shiftBody{ padding:7px; display:flex; flex-direction:column; gap:7px; min-height:34px; }
  .shift.dropok .shiftBody{ outline:2px dashed rgba(255,255,255,.5); outline-offset:-3px; border-radius:8px; }

  .deptGroup .deptName{ font-size:10px; font-weight:800; letter-spacing:.4px; color:var(--muted); text-transform:uppercase; margin:0 2px 4px; display:flex; align-items:center; gap:6px; }
  .deptGroup .deptName::before{ content:""; flex:1; height:1px; background:var(--line); }
  .deptGroup .deptName::after{ content:""; flex:1; height:1px; background:var(--line); }
  .deptBadges{ display:flex; flex-direction:column; gap:6px; }
  .deptGroup + .deptGroup{ margin-top:6px; }
  .emptyHint{ color:var(--muted); font-size:11px; text-align:center; padding:6px 2px; opacity:.7; }

  /* ===== Badge ===== */
  .badge{ border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,.20); padding:6px 8px; cursor:grab; user-select:none; }
  .badge:active{ cursor:grabbing; }
  .badge.dragging{ opacity:.4; }
  .badge.leader{ border-color:#e6edf3; }
  .badge.nodrag{ cursor:default; }
  .badge.open{ background:rgba(255,255,255,.06); }
  /* cambio turno: badge spostato in un turno diverso da quello automatico */
  .badge.changed{ background:rgba(255,107,107,.22); border-color:rgba(255,107,107,.6); }
  .shift.morning   .badge{ border-left:3px solid var(--m-bar); }
  .shift.afternoon .badge{ border-left:3px solid var(--p-bar); }
  .shift.absent    .badge{ border-left:3px solid var(--a-bar); }
  .shift.work .badge{ border-left:3px solid #2ea043; }
  .shift.home .badge{ border-left:3px solid #39424f; }
  .badge.dim{ opacity:.6; }
  .badge.dim:hover{ opacity:.85; }
  .badgeHead{ display:flex; align-items:center; gap:6px; }
  .badgeName{ font-weight:700; font-size:12px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge.isAbsent .badgeName{ color:var(--a-bar); }
  .chip{ font-size:9px; font-weight:800; padding:1px 5px; border-radius:999px; border:1px solid currentColor; white-space:nowrap; }
  .chip.crown{ border:none; padding:0; font-size:12px; }
  .chip.deloc{ border:none; padding:0; font-size:12px; }
  .chip.star{ color:#e6edf3; border:none; padding:0; font-size:11px; }
  /* toggle delocalizzato sul badge */
  .delBtn{ border:none; background:transparent; cursor:pointer; padding:0 1px; font-size:13px; line-height:1; opacity:.25; filter:grayscale(1); }
  .delBtn:hover{ opacity:.6; }
  .delBtn.on{ opacity:1; filter:none; }
  .delBtn.on:hover{ opacity:.85; }
  .badgeStatus{ font-size:10px; color:var(--muted); margin-top:2px; }
  .badgeNote{ font-size:10px; color:#cfe0f0; margin-top:2px; overflow-wrap:anywhere; }

  /* ===== Inline editor ===== */
  .editor{ margin-top:7px; padding-top:7px; border-top:1px dashed var(--line); display:flex; flex-direction:column; gap:6px; }
  .editor select, .editor input{ font-size:12px; padding:5px 6px; width:100%; }
  .editor label.ctlab{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); cursor:pointer; }
  .moveBtns{ display:flex; gap:4px; flex-wrap:wrap; }
  .moveBtns button{ font-size:10px; padding:4px 6px; flex:1; }
  .moveBtns button.cur{ outline:2px solid rgba(255,255,255,.4); }
  .fixedNote{ font-size:11px; color:var(--muted); text-align:center; padding:4px 2px; border:1px dashed var(--line); border-radius:8px; }
  .anaBox{ border-top:1px dashed var(--line); padding-top:6px; display:flex; flex-direction:column; gap:6px; }

  /* ===== Add worker ===== */
  .addbox{ margin:0 16px 24px; border:1px dashed var(--line); border-radius:12px; padding:12px; background:rgba(255,255,255,.02); }
  .addgrid{ display:grid; grid-template-columns:1.6fr 1fr .8fr .8fr auto; gap:8px; align-items:end; }
  @media (max-width: 760px){ .addgrid{ grid-template-columns:1fr; } }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field span{ font-size:11px; color:var(--muted); }
  .status{ padding:6px 16px; font-size:12px; color:var(--muted); }
  .status b{ color:var(--ok); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Presenze Divisione — Settimana</h1>
    <div class="small muted">Trascina i badge tra Mattina, Pomeriggio e Assenze, in ogni giorno. Salvataggio automatico.</div>
  </div>
  <div class="weeknav">
    <button id="prevWk" class="ghost" title="Settimana precedente">◀</button>
    <div class="wklabel" id="wkLabel">—</div>
    <button id="nextWk" class="ghost" title="Settimana successiva">▶</button>
    <button id="todayBtn" class="ghost" title="Vai a oggi">Oggi</button>
    <button id="pdfBtn" class="ghost" title="Scarica il PDF giornaliero (oggi)">🗎 PDF</button>
    <button id="xlsBtn" class="ghost" title="Scarica il prospetto settimanale Excel (Lun–Ven)">▦ Excel</button>
  </div>
  <div class="toolbar">
    <button id="saveBtn" class="primary">Salva (JSON)</button>
    <button id="loadBtn">Carica (JSON)</button>
    <input id="fileInput" type="file" accept=".json,application/json" class="hidden" />
    <button id="resetBtn" class="danger" title="Svuota le scelte della settimana">Reset settimana</button>
  </div>
</header>

<div class="week" id="week"></div>

<div class="addbox">
  <div class="small" style="font-weight:800; margin-bottom:8px;">Aggiungi operaio</div>
  <div class="addgrid">
    <label class="field"><span>Nome e cognome</span><input id="addName" type="text" placeholder="Mario Rossi" /></label>
    <label class="field"><span>Reparto</span><select id="addDept"></select></label>
    <label class="field"><span>Squadra</span><select id="addTeam"><option value="A">A</option><option value="B">B</option></select></label>
    <label class="field"><span>Leader</span><select id="addLeader"><option value="0">No</option><option value="1">Sì</option></select></label>
    <button id="addBtn" class="primary">Aggiungi</button>
  </div>
</div>

<div class="status">Stato: <b id="jsStatus">—</b> <span id="ioStatus" class="muted"></span> <span id="fileLink" class="muted"></span></div>

<!-- Anagrafica predefinita -->
<script>
window.HARD_WORKERS = [
  { id:"stefano_ancillai",     name:"Stefano Ancillai",     deptId:"N", baseTeam:"A", isLeader:true, isChief:true },
  { id:"floriana_de_rosa",     name:"Floriana De Rosa",     deptId:"N", baseTeam:"A", isLeader:false },

  { id:"davide_forcellini",    name:"Davide Forcellini",    deptId:"P", baseTeam:"A", isLeader:false },
  { id:"carlo_cubito",         name:"Carlo Cubito",         deptId:"P", baseTeam:"B", isLeader:false },
  { id:"fabrizio_lanzi",       name:"Fabrizio Lanzi",       deptId:"P", baseTeam:"A", isLeader:false },
  { id:"simone_sgalippa",      name:"Simone Sgalippa",      deptId:"P", baseTeam:"A", isLeader:false },
  { id:"angelo_pannisco",      name:"Angelo Pannisco",      deptId:"P", baseTeam:"B", isLeader:false },
  { id:"marco_fontana",        name:"Marco Fontana",        deptId:"S", baseTeam:"A", isLeader:true  },

  { id:"angelo_panunzi",       name:"Angelo Panunzi",       deptId:"S", baseTeam:"A", isLeader:true  },
  { id:"luca_ticconi",         name:"Luca Ticconi",         deptId:"S", baseTeam:"A", isLeader:false },
  { id:"roberto_tomba",        name:"Roberto Tomba",        deptId:"S", baseTeam:"B", isLeader:true  },

<script>
(() => {
"use strict";

/* ====== Costanti ====== */
/* Due reparti: Area Prestampa (ex Prestampa + Revisione) e Reparto Stampa (ex Stampa + Allestimento) */
/* Aree: Senza Turno (orario fisso 8-16:20), Area Prestampa, Reparto Stampa */
const DEPTS = [
  { id:"N", name:"Area Senza Turno", hours:"8:00–16:20", fixedMorning:true },
  { id:"P", name:"Area Prestampa" },
  { id:"S", name:"Reparto Stampa" },
];
function mapDept(old){
  const o=String(old||"").toUpperCase();
  if(o==="N") return "N";                          // Senza Turno
  if(o==="S"||o==="B"||o==="C") return "S";       // Stampa, Allestimento -> Reparto Stampa
  return "P";                                      // Prestampa, Revisione, default -> Area Prestampa
}
/* Operai rimossi definitivamente dalla compagine (filtrati anche dai dati salvati) */
const REMOVED_IDS = new Set(["roberto_benvenuti","leonardo_forti"]);
/* Operai dell'Area Senza Turno (sempre mattina, nessun cambio turno) */
const SENZA_TURNO_IDS = new Set(["stefano_ancillai","annamaria_biscetti","floriana_de_rosa"]);
function isNoShift(worker){ return worker && worker.deptId==="N"; }
const STATUS = [
  { id:"PRESENTE",              label:"Presente" },
  { id:"DELOCALIZZATO",         label:"Delocalizzato" },
  { id:"TELELAVORO",            label:"Telelavoro" },
  { id:"ENTRATA_RITARDATA",     label:"Entrata ritardata" },
  { id:"USCITA_ANTICIPATA",     label:"Uscita anticipata" },
  { id:"TURNO_G192",            label:"Turno G192" },
  { id:"MALATTIA",              label:"Malattia" },
  { id:"LEGGE_104",             label:"Legge 104" },
  { id:"CONGEDO_ORDINARIO",     label:"Congedo ordinario" },
  { id:"CONGEDO_SETTIMANALE",   label:"Congedo settimanale" },
  { id:"CONGEDO_GIORNALIERO",   label:"Congedo giornaliero" },
  { id:"CONGEDO_STRAORDINARIO", label:"Congedo straordinario" },
];
const ABSENT = new Set(["MALATTIA","LEGGE_104","CONGEDO_ORDINARIO","CONGEDO_SETTIMANALE","CONGEDO_GIORNALIERO","CONGEDO_STRAORDINARIO"]);
const SHIFTS = [
  { id:"morning",   label:"Mattina",    split:true  },
  { id:"afternoon", label:"Pomeriggio", split:true  },
  { id:"absent",    label:"Assenze",    split:false },
];
/* Sabato e Domenica: turno unico, due zone (default tutti a casa) */
const SHIFTS_WE = [
  { id:"work", label:"Al lavoro", split:false },
  { id:"home", label:"A casa",    split:false, dim:true },
];
function isWeekend(date){ const d=date.getDay(); return d===0 || d===6; }
function shiftsFor(date){ return isWeekend(date) ? SHIFTS_WE : SHIFTS; }
const DOW = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const MON = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

const STORE_WORKERS = "presenze_divisione_workers_v3";
const STORE_WEEK    = "presenze_divisione_week_v3";

/* ====== Stato ====== */
let data = { workers:[], week:{} };
window.data = data;
let anchorISO = toISO(new Date());   // un giorno qualsiasi della settimana mostrata
let expandedKey = null;              // `${workerId}__${dateISO}`
let dragId = null;
let weekendCollapsed = false;        // colonna Sab/Dom collassata
function setWeekendCollapsed(v){ weekendCollapsed=!!v; try{ localStorage.setItem("presenze_weekend_collapsed", v?"1":"0"); }catch{} render(); }

/* ====== Util ====== */
const $ = id => document.getElementById(id);
function pad(n){ return String(n).padStart(2,"0"); }
function toISO(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fromISO(s){ return new Date(s + "T00:00:00"); }
function uuid(){ return "id_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16); }
function normName(s){ return String(s ?? "").trim().replace(/\s+/g," "); }
function clamp(s,n){ const t=String(s ?? ""); return t.length>n ? t.slice(0,n) : t; }
function deptById(id){ return DEPTS.find(d => d.id === id); }
function statusLabel(id){ return (STATUS.find(s => s.id === id)?.label) || id; }
function isAbsentStatus(st){ return ABSENT.has(st); }

function mondayOf(d){ const x=new Date(d); const k=(x.getDay()+6)%7; x.setDate(x.getDate()-k); x.setHours(0,0,0,0); return x; }
function weekDates(d){ const m=mondayOf(d); return Array.from({length:7},(_,i)=>{ const x=new Date(m); x.setDate(m.getDate()+i); return x; }); }
function getISOWeekKey(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dn=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const wn=Math.ceil((((d-ys)/86400000)+1)/7);
  return `${d.getUTCFullYear()}-W${pad(wn)}`;
}
function getISOWeekNumber(date){ return parseInt(getISOWeekKey(date).split("W")[1],10); }
function isEvenWeek(date){ return (getISOWeekNumber(date)%2)===0; }
/* Alternanza: settimana pari -> mattina A, dispari -> mattina B */
function isMorningTeam(team,date){ return team === (isEvenWeek(date) ? "A" : "B"); }
/* Turno automatico secondo l'alternanza squadre (settimana pari -> mattina A, dispari -> B) */
function autoWorkShift(worker,date){
  if(isNoShift(worker)) return "morning";          // Area Senza Turno: sempre mattina
  return isMorningTeam(worker.baseTeam,date) ? "morning" : "afternoon";
}
/* Turno effettivo: manuale (rec.shift) ha priorità, altrimenti automatico */
function effShift(worker,rec,date){
  if(isWeekend(date)) return rec.shift==="work" ? "work" : "home";   // default: a casa
  if(isNoShift(worker)) return isAbsentStatus(rec.status||"PRESENTE") ? "absent" : "morning";
  if(rec.shift==="morning"||rec.shift==="afternoon"||rec.shift==="absent") return rec.shift;
  if(isAbsentStatus(rec.status||"PRESENTE")) return "absent";
  return autoWorkShift(worker,date);
}

/* ====== Storage (autosave) ====== */
function loadStore(key){ try{ const r=localStorage.getItem(key); return r ? JSON.parse(r) : null; }catch{ return null; } }
function saveWorkers(){ try{ localStorage.setItem(STORE_WORKERS, JSON.stringify(data.workers)); }catch{} scheduleFileWrite(); }
function saveWeek(){ try{ localStorage.setItem(STORE_WEEK, JSON.stringify(data.week)); }catch{} scheduleFileWrite(); }

/* ====== Day record ====== */
function ensureDay(weekKey,iso){
  if(!data.week[weekKey]) data.week[weekKey] = { days:{} };
  if(!data.week[weekKey].days[iso]) data.week[weekKey].days[iso] = {};
}
function getRec(weekKey,iso,wid){
  ensureDay(weekKey,iso);
  return data.week[weekKey].days[iso][wid] || { status:"PRESENTE", deloc:false, note:"", shift:null };
}
function setRec(weekKey,iso,wid,patch){
  ensureDay(weekKey,iso);
  const cur = getRec(weekKey,iso,wid);
  data.week[weekKey].days[iso][wid] = { ...cur, ...patch };
  saveWeek();
}

/* ====== JSON import/export ====== */
function ioMsg(m){ const e=$("ioStatus"); if(e) e.textContent = m ? ("· " + m) : ""; }
function downloadJson(filename,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },200);
}
function normWorker(w){
  return {
    id:String(w.id||uuid()), name:normName(w.name||""),
    deptId:mapDept(w.deptId),
    baseTeam:(String(w.baseTeam||"A").toUpperCase()==="B")?"B":"A",
    isLeader:!!w.isLeader,
    isChief:!!w.isChief
  };
}
function buildPayload(){
  return { version:3, exportedAt:new Date().toISOString(), workers:data.workers.map(normWorker), week:data.week||{} };
}
function exportJson(){
  downloadJson("presenze_data.json", buildPayload());
  ioMsg("salvato presenze_data.json");
}
function importJsonText(text){
  let obj;
  try{ obj = JSON.parse(text); }
  catch(e){ throw new Error("JSON non valido: " + (e?.message||e)); }
  if(!obj || typeof obj!=="object" || !Array.isArray(obj.workers)) throw new Error("File non valido (manca 'workers').");
  data.workers = obj.workers.map(normWorker).filter(w=>w.name && !REMOVED_IDS.has(w.id));
  for(const x of data.workers){ if(SENZA_TURNO_IDS.has(x.id)) x.deptId="N"; if(x.id==="stefano_ancillai") x.isChief=true; }
  data.week = (obj.week && typeof obj.week==="object") ? obj.week : {};
  saveWorkers(); saveWeek(); render();
}
async function importJson(file){ importJsonText(await file.text()); ioMsg("dati caricati"); }

/* ====== File collegato nella cartella (File System Access API) ====== */
const FSA = (typeof window!=="undefined") && ("showSaveFilePicker" in window);
let fileHandle=null, fsTimer=null, fsPending=false, fsWriting=false;
function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open("presenze_fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbSet(k,v){ const db=await idbOpen(); return new Promise((res,rej)=>{ const t=db.transaction("h","readwrite"); t.objectStore("h").put(v,k); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); }); }
async function idbGet(k){ const db=await idbOpen(); return new Promise((res,rej)=>{ const t=db.transaction("h","readonly"); const q=t.objectStore("h").get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }
async function idbDel(k){ const db=await idbOpen(); return new Promise((res)=>{ const t=db.transaction("h","readwrite"); t.objectStore("h").delete(k); t.oncomplete=()=>res(); }); }
function setLinkStatus(text,onClick){
  const el=$("fileLink"); if(!el) return;
  el.textContent = text ? ("· "+text) : "";
  el.style.cursor = onClick?"pointer":"default";
  el.style.textDecoration = onClick?"underline":"none";
  el.onclick = onClick||null;
}
function scheduleFileWrite(){ if(!fileHandle) return; fsPending=true; clearTimeout(fsTimer); fsTimer=setTimeout(flushFileWrite,600); }
async function flushFileWrite(){
  if(!fileHandle||fsWriting||!fsPending) return;
  fsWriting=true; fsPending=false;
  try{
    if((await fileHandle.queryPermission({mode:"readwrite"}))!=="granted"){ fsWriting=false; return; }
    const w=await fileHandle.createWritable();
    await w.write(JSON.stringify(buildPayload(),null,2));
    await w.close();
    setLinkStatus("file: "+fileHandle.name+" (salvato ✓)");
  }catch(e){ setLinkStatus("errore scrittura file"); }
  fsWriting=false;
  if(fsPending) flushFileWrite();
}
function fsaError(e){
  if(e?.name==="AbortError") return null;
  if(e?.name==="SecurityError") return "il browser blocca i file in locale: apri l'app via http o GitHub Pages";
  return (e?.message||String(e));
}
async function fsaLinkSave(){
  try{
    const h=await window.showSaveFilePicker({ suggestedName:"presenze_data.json", types:[{description:"Dati Presenze (JSON)",accept:{"application/json":[".json"]}}] });
    fileHandle=h; await idbSet("dataFile",h);
    fsPending=true; await flushFileWrite();
    setLinkStatus("file collegato: "+h.name+" — salvataggio automatico");
  }catch(e){ const m=fsaError(e); if(m) setLinkStatus("errore: "+m); }
}
async function fsaLinkOpen(){
  try{
    const [h]=await window.showOpenFilePicker({ types:[{description:"Dati Presenze (JSON)",accept:{"application/json":[".json"]}}] });
    let p=await h.queryPermission({mode:"readwrite"});
    if(p!=="granted") p=await h.requestPermission({mode:"readwrite"});

    fileHandle=h; await idbSet("dataFile",h);

  }catch(e){ const m=fsaError(e); if(m){ setLinkStatus("errore: "+m); alert("Errore: "+m); } }
}
async function fsaReconnect(){
  if(!FSA){ return; }
  let h; try{ h=await idbGet("dataFile"); }catch{ return; }
  if(!h){ setLinkStatus("nessun file collegato — usa 'Apri file' o 'Collega file'"); return; }
  try{
    if((await h.queryPermission({mode:"readwrite"}))==="granted"){
      fileHandle=h;
      try{ const f=await h.getFile(); if(f.size>0) importJsonText(await f.text()); }catch{}
      setLinkStatus("file collegato: "+h.name+" — salvataggio automatico");
    }else{
      setLinkStatus("clic per ricollegare il file: "+h.name, async()=>{
        if((await h.requestPermission({mode:"readwrite"}))==="granted"){
          fileHandle=h;
          try{ const f=await h.getFile(); if(f.size>0) importJsonText(await f.text()); }catch{}
          setLinkStatus("file collegato: "+h.name+" — salvataggio automatico"); render();
        }
      });
    }
  }catch(e){}
}

/* ====== Download helper ====== */
function downloadBlob(filename,data,type){
  const blob=new Blob([data],{type});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },200);
}

/* ====== Etichette comuni a PDF / Excel ====== */
const GIORNI_IT=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const MESI_IT=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
function dateLabelIT(date){ return `${GIORNI_IT[date.getDay()]} ${date.getDate()} ${MESI_IT[date.getMonth()]} ${date.getFullYear()}`; }
function isDeloc(rec,st){ return !!rec.deloc || st==="DELOCALIZZATO" || st==="TELELAVORO"; }
/* descrizione collocazione di un operaio in un giorno */
function placementText(worker,rec,date){
  const st=rec.status||"PRESENTE";
  const sh=effShift(worker,rec,date);
  let base;
  if(sh==="absent") base=statusLabel(st);
  else if(sh==="home") base="A casa";
  else if(sh==="work") base="Al lavoro";
  else if(sh==="morning") base=isNoShift(worker)?"Mattina (8–16:20)":"Mattina";
  else if(sh==="afternoon") base="Pomeriggio";
  else base=sh;
  const extra=[];
  if(sh!=="absent" && isDeloc(rec,st)) extra.push("Deloc");
  if(sh!=="absent" && st!=="PRESENTE" && !isAbsentStatus(st) && st!=="DELOCALIZZATO" && st!=="TELELAVORO") extra.push(statusLabel(st));
  if((rec.note||"").trim()) extra.push(rec.note.trim());
  return base + (extra.length?(" — "+extra.join(", ")):"");
}

/* ====== PDF giornaliero (testo, A4) ====== */
function pdfLatin1(s){
  let t=String(s||"");
  try{ t=t.normalize("NFKD").replace(/[̀-ͯ]/g,""); }catch{}
  t=t.replace(/’|‘/g,"'").replace(/–|—/g,"-").replace(/…/g,"...").replace(/[·•]/g,"-");
  let out=""; for(let i=0;i<t.length;i++){ const c=t.charCodeAt(i); out+=(c>255)?"":t[i]; }
  return out;
}
function pdfEsc(s){ return pdfLatin1(s).replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)"); }
function pdfText(cmd,x,yTop,size,bold,text){
  const y=(841.89-yTop).toFixed(2);
  cmd.push("BT",`/${bold?"F2":"F1"} ${size} Tf`,`${x.toFixed(2)} ${y} Td`,`(${pdfEsc(text)}) Tj`,"ET");
}
function buildPdf(content){
  const A4W=595.28, A4H=841.89;
  const bytes=new TextEncoder().encode(content);
  const objs=[
    "<< /Type /Catalog /Pages 2 0 R >>",
    "<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
    `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${A4W} ${A4H}] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>`,
    `<< /Length ${bytes.length} >>\nstream\n`,
    "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
    "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>"
  ];
  let pdf="%PDF-1.4\n"; const off=[0];
  const addSimple=(i,b)=>{ off[i]=pdf.length; pdf+=`${i} 0 obj\n${b}\nendobj\n`; };
  const addStream=(i,h,b)=>{ off[i]=pdf.length; pdf+=`${i} 0 obj\n${h}`; let s=""; for(let k=0;k<b.length;k++) s+=String.fromCharCode(b[k]); pdf+=s+"\nendstream\nendobj\n"; };
  addSimple(1,objs[0]); addSimple(2,objs[1]); addSimple(3,objs[2]); addStream(4,objs[3],bytes); addSimple(5,objs[4]); addSimple(6,objs[5]);
  const xref=pdf.length;
  pdf+="xref\n0 7\n0000000000 65535 f \n";
  for(let i=1;i<=6;i++) pdf+=String(off[i]).padStart(10,"0")+" 00000 n \n";
  pdf+=`trailer\n<< /Size 7 /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
  const out=new Uint8Array(pdf.length);
  for(let i=0;i<pdf.length;i++) out[i]=pdf.charCodeAt(i)&0xff;
  return out;
}
function pdfNameLine(it){
  const w=it.worker;
  let s=w.name;
  if(w.isChief) s="* "+s+" (Capo Officina)";
  else if(w.isLeader) s="* "+s;
  const desc=placementText(w,it.rec,it._date);
  return s + "  —  " + desc;
}
function downloadDailyPDF(){
  const date=new Date();                 // PDF di OGGI
  const iso=toISO(date), wk=getISOWeekKey(date);
  const cmd=[]; let y=46;
  pdfText(cmd,40,y,16,true,"Presenze Divisione"); y+=20;
  pdfText(cmd,40,y,12,false,dateLabelIT(date)); y+=24;

  const shifts=shiftsFor(date);
  const buckets={}; for(const s of shifts) buckets[s.id]=[];
  for(const w of data.workers){
    const rec=getRec(wk,iso,w.id);
    const it={worker:w,rec,_date:date};
    (buckets[effShift(w,rec,date)]||buckets[shifts[shifts.length-1].id]).push(it);
  }
  for(const sh of shifts){
    const items=buckets[sh.id];
    if(y>800){ pdfText(cmd,40,y,9,false,"(continua…)"); break; }
    pdfText(cmd,40,y,13,true,sh.label.toUpperCase()+"  ("+items.length+")"); y+=17;
    if(!items.length){ pdfText(cmd,52,y,10,false,"—"); y+=15; continue; }
    if(sh.split){
      for(const d of DEPTS){
        const inDept=sortLeaderFirst(items.filter(x=>x.worker.deptId===d.id));
        if(!inDept.length) continue;
        pdfText(cmd,52,y,11,true,(d.hours?d.name+" ("+d.hours+")":d.name)); y+=14;
        for(const it of inDept){ if(y>815) break; pdfText(cmd,64,y,10,false,pdfNameLine(it)); y+=13; }
        y+=4;
      }
    }else{
      for(const it of sortLeaderFirst(items)){ if(y>815) break; pdfText(cmd,52,y,10,false,pdfNameLine(it)); y+=13; }
    }
    y+=8;
  }
  downloadBlob(`Presenze_${iso}.pdf`, buildPdf(cmd.join("\n")+"\n"), "application/pdf");
  ioMsg("PDF giornaliero scaricato");
}

/* ====== Excel settimanale (Lun–Ven, formato .xls HTML) ====== */
function xmlEsc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function downloadWeeklyExcel(){
  const days=weekDates(fromISO(anchorISO)).filter(d=>!isWeekend(d));   // esclude Sab/Dom
  const wkKey=getISOWeekKey(fromISO(anchorISO));
  const dd=d=>pad(d.getDate())+"/"+pad(d.getMonth()+1);

  let h='<html><head><meta charset="UTF-8"></head><body>';
  h+='<table border="1" cellspacing="0" cellpadding="4" style="border-collapse:collapse;font-family:Arial;font-size:12px">';
  h+=`<tr><td colspan="${days.length+1}" style="font-weight:bold;font-size:14px;background:#1f6feb;color:#fff">Prospetto settimanale — Settimana ${wkKey}</td></tr>`;
  h+='<tr style="background:#dce6f5;font-weight:bold"><td>Nominativo</td>';
  for(let i=0;i<days.length;i++) h+=`<td>${DOW[i]} ${dd(days[i])}</td>`;
  h+='</tr>';

  for(const dpt of DEPTS){
    const list=sortLeaderFirst(data.workers.filter(w=>w.deptId===dpt.id).map(w=>({worker:w})));
    if(!list.length) continue;
    h+=`<tr><td colspan="${days.length+1}" style="font-weight:bold;background:#eef2f7">${xmlEsc(dpt.hours?dpt.name+" ("+dpt.hours+")":dpt.name)}</td></tr>`;
    for(const it of list){
      const w=it.worker;
      const nm=(w.isChief?"★ ":(w.isLeader?"• ":""))+w.name+(w.isChief?" (Capo Officina)":"");
      h+='<tr><td>'+xmlEsc(nm)+'</td>';
      for(const d of days){
        const rec=getRec(getISOWeekKey(d),toISO(d),w.id);
        const txt=placementText(w,rec,d);
        const absent=effShift(w,rec,d)==="absent";
        h+=`<td${absent?' style="color:#c00"':''}>${xmlEsc(txt)}</td>`;
      }
      h+='</tr>';
    }
  }
  h+='</table></body></html>';
  downloadBlob(`Prospetto_${wkKey}.xls`, "﻿"+h, "application/vnd.ms-excel");
  ioMsg("Excel settimanale scaricato");
}

/* ====== Move / mutations ====== */
function moveWorker(wid,iso,shift){
  const worker=data.workers.find(w=>w.id===wid);
  const date=fromISO(iso);
  if(isNoShift(worker) && !isWeekend(date)) return; // Area Senza Turno: fisso solo nei feriali
  const wk=getISOWeekKey(date);
  const rec=getRec(wk,iso,wid);
  const patch={ shift };
  if(shift!=="absent" && isAbsentStatus(rec.status||"PRESENTE")) patch.status="PRESENTE";
  setRec(wk,iso,wid,patch);
  render();
}
function changeStatus(wid,iso,status){
  const date=fromISO(iso), wk=getISOWeekKey(date);
  const worker=data.workers.find(w=>w.id===wid);
  const rec=getRec(wk,iso,wid);
  const patch={ status };
  if(isAbsentStatus(status)) patch.shift="absent";
  else if(rec.shift==="absent") patch.shift=autoWorkShift(worker,date);
  setRec(wk,iso,wid,patch);
  render();
}

/* ====== Render ====== */
function render(){
  renderWeekLabel();
  renderWeek();
  $("jsStatus").textContent = "OK";
}
function renderWeekLabel(){
  const days=weekDates(fromISO(anchorISO));
  const a=days[0], b=days[6];
  const wk=getISOWeekKey(fromISO(anchorISO));
  $("wkLabel").innerHTML = `Settimana ${wk}<br><span class="small muted">${a.getDate()} ${MON[a.getMonth()]} – ${b.getDate()} ${MON[b.getMonth()]} ${b.getFullYear()}</span>`;
}

function rankOf(w){ return w.isChief ? 0 : (w.isLeader ? 1 : 2); }   /* Capo Officina sempre primo */
function sortLeaderFirst(list){
  return list.slice().sort((x,y)=>{
    const r=rankOf(x.worker)-rankOf(y.worker);
    if(r!==0) return r;
    return x.worker.name.localeCompare(y.worker.name,"it");
  });
}

function buildDayColumn(date, todayISO){
  const iso=toISO(date), wk=getISOWeekKey(date);
  const weekend=isWeekend(date);
  const col=document.createElement("div");
  col.className="day"+(iso===todayISO?" today":"")+(weekend?" weekend":"");

  const head=document.createElement("div"); head.className="dayHead";
  head.innerHTML=`<div class="dow">${DOW[(date.getDay()+6)%7]}</div><div class="dnum">${date.getDate()} ${MON[date.getMonth()]}</div>`;
  col.appendChild(head);

  // buckets per turno (feriale: mattina/pomeriggio/assenze · weekend: al lavoro/a casa)
  const shifts=shiftsFor(date);
  const buckets={}; for(const s of shifts) buckets[s.id]=[];
  for(const w of data.workers){
    const rec=getRec(wk,iso,w.id);
    const sh=effShift(w,rec,date);
    (buckets[sh]||buckets[shifts[shifts.length-1].id]).push({ worker:w, rec });
  }

  const body=document.createElement("div"); body.className="dayBody";
  for(const sh of shifts){
    const block=document.createElement("div"); block.className="shift "+sh.id;
    block.dataset.shift=sh.id; block.dataset.date=iso;

    const sHead=document.createElement("div"); sHead.className="shiftHead";
    sHead.innerHTML=`<span>${sh.label}</span><span class="n">${buckets[sh.id].length}</span>`;
    block.appendChild(sHead);

    const sBody=document.createElement("div"); sBody.className="shiftBody";
    const items=buckets[sh.id];

    if(sh.split){
      // suddivisione: Area Senza Turno / Area Prestampa / Reparto Stampa (solo gruppi non vuoti)
      for(const d of DEPTS){
        const inDept=items.filter(x=>x.worker.deptId===d.id);
        if(!inDept.length) continue;
        const grp=document.createElement("div"); grp.className="deptGroup";
        const nm=document.createElement("div"); nm.className="deptName";
        nm.textContent=d.hours ? (d.name+" · "+d.hours) : d.name;
        grp.appendChild(nm);
        const bb=document.createElement("div"); bb.className="deptBadges";
        for(const it of sortLeaderFirst(inDept)) bb.appendChild(buildBadge(it.worker,it.rec,iso,sh.id,date));
        grp.appendChild(bb);
        sBody.appendChild(grp);
      }
      if(!items.length){ const e=document.createElement("div"); e.className="emptyHint"; e.textContent="— trascina qui —"; sBody.appendChild(e); }
    }else{
      if(!items.length){ const e=document.createElement("div"); e.className="emptyHint"; e.textContent=(sh.id==="absent"?"nessuno":"— trascina qui —"); sBody.appendChild(e); }
      else for(const it of sortLeaderFirst(items)){ const b=buildBadge(it.worker,it.rec,iso,sh.id,date); if(sh.dim) b.classList.add("dim"); sBody.appendChild(b); }
    }

    block.appendChild(sBody);
    body.appendChild(block);
  }
  col.appendChild(body);
  return col;
}

function renderWeek(){
  const root=$("week"); root.innerHTML="";
  const todayISO=toISO(new Date());
  const weekendCols=[];
  for(const date of weekDates(fromISO(anchorISO))){
    if(isWeekend(date)) weekendCols.push(buildDayColumn(date,todayISO));
    else root.appendChild(buildDayColumn(date,todayISO));
  }
  if(weekendCols.length){
    const wrap=document.createElement("div");
    wrap.className="weekendWrap"+(weekendCollapsed?" collapsed":"");
    const handle=document.createElement("div");
    handle.className="handle";
    handle.textContent=(weekendCollapsed?"▸ ":"◂ ")+"Weekend";
    handle.title=weekendCollapsed ? "Mostra Sabato e Domenica" : "Nascondi Sabato e Domenica";
    handle.addEventListener("click",()=>setWeekendCollapsed(!weekendCollapsed));
    const days=document.createElement("div"); days.className="wkndDays";
    for(const c of weekendCols) days.appendChild(c);
    wrap.appendChild(handle); wrap.appendChild(days);
    root.appendChild(wrap);
  }
}

function buildBadge(worker,rec,iso,curShift,date){
  const st=rec.status||"PRESENTE";
  const isAbs=isAbsentStatus(st);
  const isDel=!!rec.deloc || st==="DELOCALIZZATO" || st==="TELELAVORO";
  const fixed=isNoShift(worker) && !isWeekend(date);   // turno fisso solo nei feriali
  // cambio turno: collocato in un turno lavorativo diverso da quello automatico (solo feriali)
  const isChanged=!fixed && !isWeekend(date) && (curShift==="morning"||curShift==="afternoon") && curShift!==autoWorkShift(worker,date);
  const key=worker.id+"__"+iso;
  const open=expandedKey===key;

  const el=document.createElement("div");
  el.className="badge"+(worker.isLeader?" leader":"")+(isAbs?" isAbsent":"")+(isChanged?" changed":"")+(fixed?" nodrag":"")+(open?" open":"");
  el.draggable=!fixed;
  el.dataset.id=worker.id;

  const head=document.createElement("div"); head.className="badgeHead";
  if(worker.isChief){ const s=document.createElement("span"); s.className="chip crown"; s.textContent="👑"; s.title="Capo Officina"; head.appendChild(s); }
  else if(worker.isLeader){ const s=document.createElement("span"); s.className="chip star"; s.textContent="★"; s.title="Leader"; head.appendChild(s); }
  const nm=document.createElement("span"); nm.className="badgeName"; nm.textContent=worker.name; head.appendChild(nm);
  // toggle delocalizzato direttamente sul badge (senza aprire la scheda)
  const delBtn=document.createElement("button");
  delBtn.type="button";
  delBtn.className="delBtn"+(isDel?" on":"");
  delBtn.textContent="🏠";
  delBtn.title=isDel?"Delocalizzato: clic per togliere":"Segna come delocalizzato";
  delBtn.addEventListener("mousedown",e=>e.stopPropagation());
  delBtn.addEventListener("click",e=>{ e.stopPropagation(); setRec(getISOWeekKey(date),iso,worker.id,{deloc:!rec.deloc}); render(); });
  head.appendChild(delBtn);
  head.addEventListener("click",()=>{ expandedKey=open?null:key; render(); });
  el.appendChild(head);

  if(st!=="PRESENTE"){ const s=document.createElement("div"); s.className="badgeStatus"; s.textContent=statusLabel(st); el.appendChild(s); }
  if((rec.note||"").trim()){ const n=document.createElement("div"); n.className="badgeNote"; n.textContent=rec.note.trim(); el.appendChild(n); }

  if(open) el.appendChild(buildEditor(worker,rec,iso,curShift));
  return el;
}

function buildEditor(worker,rec,iso,curShift){
  const wk=getISOWeekKey(fromISO(iso));
  const ed=document.createElement("div"); ed.className="editor";
  ed.addEventListener("click",e=>e.stopPropagation());
  ed.draggable=false;
  ed.addEventListener("mousedown",e=>e.stopPropagation());

  // stato
  const sel=document.createElement("select");
  for(const s of STATUS){ const o=document.createElement("option"); o.value=s.id; o.textContent=s.label; if(s.id===(rec.status||"PRESENTE")) o.selected=true; sel.appendChild(o); }
  sel.addEventListener("change",()=>changeStatus(worker.id,iso,sel.value));
  ed.appendChild(sel);

  // Delocalizzato (flag con iconetta sul badge)
  const ctl=document.createElement("label"); ctl.className="ctlab";
  const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!rec.deloc;
  cb.addEventListener("change",()=>{ setRec(wk,iso,worker.id,{deloc:cb.checked}); render(); });
  ctl.appendChild(cb); ctl.appendChild(document.createTextNode("🏠 Delocalizzato"));
  ed.appendChild(ctl);

  // note
  const note=document.createElement("input"); note.type="text"; note.placeholder="Note…"; note.maxLength=50; note.value=rec.note||"";
  note.addEventListener("input",()=>setRec(wk,iso,worker.id,{note:clamp(note.value,50)}));
  ed.appendChild(note);

  // sposta (fallback al drag) — non disponibile per l'Area Senza Turno nei feriali
  const date=fromISO(iso);
  if(isNoShift(worker) && !isWeekend(date)){
    const note=document.createElement("div"); note.className="fixedNote"; note.textContent="Turno fisso · Mattina 8:00–16:20";
    ed.appendChild(note);
  }else{
    const mv=document.createElement("div"); mv.className="moveBtns";
    for(const s of shiftsFor(date)){
      const b=document.createElement("button"); b.type="button"; b.textContent=s.label;
      if(s.id===curShift) b.classList.add("cur");
      b.addEventListener("click",()=>moveWorker(worker.id,iso,s.id));
      mv.appendChild(b);
    }
    ed.appendChild(mv);
  }

  // anagrafica
  const ana=document.createElement("div"); ana.className="anaBox";
  const nameInp=document.createElement("input"); nameInp.type="text"; nameInp.value=worker.name; nameInp.maxLength=40; nameInp.placeholder="Nome";
  nameInp.addEventListener("input",()=>{ worker.name=normName(nameInp.value); saveWorkers(); });
  nameInp.addEventListener("blur",()=>render());
  ana.appendChild(nameInp);

  const deptSel=document.createElement("select");
  for(const d of DEPTS){ const o=document.createElement("option"); o.value=d.id; o.textContent=d.name; if(d.id===worker.deptId) o.selected=true; deptSel.appendChild(o); }
  deptSel.addEventListener("change",()=>{ worker.deptId=deptSel.value; saveWorkers(); render(); });
  ana.appendChild(deptSel);

  const teamSel=document.createElement("select");
  teamSel.innerHTML='<option value="A">Squadra A</option><option value="B">Squadra B</option>'; teamSel.value=worker.baseTeam;
  teamSel.addEventListener("change",()=>{ worker.baseTeam=teamSel.value; saveWorkers(); render(); });
  ana.appendChild(teamSel);

  const leadSel=document.createElement("select");
  leadSel.innerHTML='<option value="0">Leader: No</option><option value="1">Leader: Sì</option>'; leadSel.value=worker.isLeader?"1":"0";
  leadSel.addEventListener("change",()=>{ worker.isLeader=(leadSel.value==="1"); saveWorkers(); render(); });
  ana.appendChild(leadSel);

  const del=document.createElement("button"); del.type="button"; del.className="danger"; del.textContent="Elimina operaio";
  del.addEventListener("click",()=>{
    if(!confirm("Eliminare "+worker.name+"?")) return;
    data.workers=data.workers.filter(w=>w.id!==worker.id);
    for(const k of Object.keys(data.week)){
      const days=data.week[k]?.days||{};
      for(const di of Object.keys(days)){ if(days[di]?.[worker.id]) delete days[di][worker.id]; }
    }
    if(expandedKey && expandedKey.startsWith(worker.id+"__")) expandedKey=null;
    saveWorkers(); saveWeek(); render();
  });
  ana.appendChild(del);
  ed.appendChild(ana);

  return ed;
}

/* ====== Drag & Drop (delegato) ====== */
function setupDnD(){
  const root=$("week");
  root.addEventListener("dragstart",e=>{
    const b=e.target.closest(".badge"); if(!b) return;
    dragId=b.dataset.id;
    e.dataTransfer.effectAllowed="move";
    try{ e.dataTransfer.setData("text/plain",dragId); }catch{}
    b.classList.add("dragging");
  });
  root.addEventListener("dragend",e=>{
    const b=e.target.closest(".badge"); if(b) b.classList.remove("dragging");
    root.querySelectorAll(".shift.dropok").forEach(c=>c.classList.remove("dropok"));
    dragId=null;
  });
  root.addEventListener("dragover",e=>{
    const z=e.target.closest(".shift"); if(!z) return;
    e.preventDefault(); e.dataTransfer.dropEffect="move";
    root.querySelectorAll(".shift.dropok").forEach(c=>{ if(c!==z) c.classList.remove("dropok"); });
    z.classList.add("dropok");
  });
  root.addEventListener("dragleave",e=>{
    const z=e.target.closest(".shift");
    if(z && !z.contains(e.relatedTarget)) z.classList.remove("dropok");
  });
  root.addEventListener("drop",e=>{
    const z=e.target.closest(".shift"); if(!z) return;
    e.preventDefault();
    const id=dragId || (()=>{ try{ return e.dataTransfer.getData("text/plain"); }catch{ return null; } })();
    z.classList.remove("dropok");
    if(id) moveWorker(id, z.dataset.date, z.dataset.shift);
  });
}

/* ====== Aggiungi operaio ====== */
function fillAddMenus(){
  const ad=$("addDept"); ad.innerHTML="";
  for(const d of DEPTS){ const o=document.createElement("option"); o.value=d.id; o.textContent=d.name; if(d.id==="P") o.selected=true; ad.appendChild(o); }
}
function addWorker(){
  const name=normName($("addName").value);
  if(!name){ alert("Inserisci un nome."); return; }
  data.workers.push({ id:uuid(), name, deptId:$("addDept").value, baseTeam:$("addTeam").value, isLeader:$("addLeader").value==="1" });
  saveWorkers();
  $("addName").value="";
  render();
}

/* ====== Reset settimana ====== */
function resetWeek(){
  const wk=getISOWeekKey(fromISO(anchorISO));
  if(!confirm("Svuotare le scelte della settimana "+wk+"? (l'anagrafica resta)")) return;
  delete data.week[wk]; saveWeek(); render();
}

/* ====== Init ====== */
function bootstrap(){
  const w=loadStore(STORE_WORKERS);
  if(Array.isArray(w) && w.length){ data.workers=w.map(normWorker); }
  else{
    // prova a migrare dalla versione precedente (v2) o usa l'anagrafica predefinita
    const old=loadStore("presenze_divisione_workers_v2");
    const src=(Array.isArray(old)&&old.length)?old:(window.HARD_WORKERS||[]);
    data.workers=src.map(normWorker);
  }
  // rimuove gli operai eliminati definitivamente, assegna l'Area Senza Turno e il Capo Officina
  data.workers=data.workers.filter(x=>!REMOVED_IDS.has(x.id));
  for(const x of data.workers){
    if(SENZA_TURNO_IDS.has(x.id)) x.deptId="N";
    if(x.id==="stefano_ancillai") x.isChief=true;
  }
  saveWorkers();
  const wk=loadStore(STORE_WEEK) || loadStore("presenze_divisione_week_v2");
  if(wk && typeof wk==="object") data.week=wk;
}

function init(){
  try{
    bootstrap();
    weekendCollapsed = (localStorage.getItem("presenze_weekend_collapsed")==="1");
    fillAddMenus();
    setupDnD();
    $("prevWk").addEventListener("click",()=>{ const d=fromISO(anchorISO); d.setDate(d.getDate()-7); anchorISO=toISO(d); expandedKey=null; render(); });
    $("nextWk").addEventListener("click",()=>{ const d=fromISO(anchorISO); d.setDate(d.getDate()+7); anchorISO=toISO(d); expandedKey=null; render(); });
    $("todayBtn").addEventListener("click",()=>{ anchorISO=toISO(new Date()); expandedKey=null; render(); });
    $("pdfBtn").addEventListener("click",()=>{ try{ downloadDailyPDF(); }catch(e){ ioMsg("errore PDF: "+(e?.message||e)); } });
    $("xlsBtn").addEventListener("click",()=>{ try{ downloadWeeklyExcel(); }catch(e){ ioMsg("errore Excel: "+(e?.message||e)); } });
    if(FSA){
      // Chrome/Edge: collega un file nella cartella e salva/carica automaticamente
      $("saveBtn").textContent="💾 Collega file";
      $("saveBtn").title="Collega un file JSON nella cartella: salvataggio automatico a ogni modifica";
      $("loadBtn").textContent="📂 Apri file";
      $("loadBtn").title="Apri un file JSON esistente e collegalo per il salvataggio automatico";
      $("saveBtn").addEventListener("click",fsaLinkSave);
      $("loadBtn").addEventListener("click",fsaLinkOpen);
    }else{
      $("saveBtn").addEventListener("click",exportJson);
      $("loadBtn").addEventListener("click",()=>$("fileInput").click());
      setLinkStatus("salvataggio file automatico non disponibile in questo browser (usa Chrome/Edge)");
    }
    $("fileInput").addEventListener("change",async()=>{
      const f=$("fileInput").files?.[0]; if(!f) return;
      try{ await importJson(f); }catch(e){ ioMsg("errore: "+(e?.message||e)); alert("Errore caricamento: "+(e?.message||e)); }
      finally{ $("fileInput").value=""; }
    });
    $("resetBtn").addEventListener("click",resetWeek);
    $("addBtn").addEventListener("click",addWorker);
    $("addName").addEventListener("keydown",e=>{ if(e.key==="Enter") addWorker(); });
    render();
    fsaReconnect();   // ricollega il file dati se già scelto in precedenza
  }catch(e){
    $("jsStatus").textContent="ERRORE";
    ioMsg((e?.stack||e?.message||String(e)));
  }
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();
})();
</script>
