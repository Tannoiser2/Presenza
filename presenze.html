<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Presenze Divisione — Settimanale</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121826; --panel2:#0f1522;
    --text:#e6edf3; --muted:#9fb0c0; --line:#223044;
    --m-bar:#1f6feb;          /* mattina  */
    --p-bar:#f6c26a;          /* pomeriggio */
    --a-bar:#ff6b6b;          /* assenti  */
    --m-soft: rgba(31,111,235,0.12);
    --p-soft: rgba(246,194,106,0.14);
    --a-soft: rgba(255,107,107,0.14);
    --ok:#2ecc71;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
  header{ padding:12px 16px; border-bottom:1px solid var(--line); display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
  h1{ font-size:16px; margin:0; font-weight:800; letter-spacing:.3px; }
  .muted{ color:var(--muted); }
  .small{ font-size:12px; }
  button,select,input{ background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:7px 10px; font-size:13px; }
  button{ cursor:pointer; }
  button:hover{ border-color:#30445f; }
  button.ghost{ background:transparent; }
  button.primary{ background:rgba(31,111,235,.18); border-color:rgba(31,111,235,.55); }
  button.danger{ background:#3a1115; border-color:#6b1a22; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  /* ===== Week navigation ===== */
  .weeknav{ display:flex; align-items:center; gap:10px; }
  .weeknav .wklabel{ font-weight:800; font-size:14px; min-width:230px; text-align:center; }

  /* ===== Day tabs ===== */
  .daytabs{ display:flex; gap:6px; flex-wrap:wrap; padding:12px 16px 0; }
  .daytab{ border:1px solid var(--line); background:transparent; color:var(--muted); padding:8px 12px; border-radius:12px; font-size:12px; cursor:pointer; line-height:1.1; text-align:center; min-width:64px; }
  .daytab b{ display:block; font-size:13px; color:var(--text); font-weight:800; }
  .daytab.active{ background:rgba(31,111,235,.18); border-color:rgba(31,111,235,.55); }
  .daytab.today{ box-shadow: inset 0 0 0 1px rgba(46,204,113,.5); }
  .daytab .cnt{ font-size:10px; opacity:.8; }

  /* ===== Board ===== */
  .board{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; padding:12px 16px 28px; }
  @media (max-width: 900px){ .board{ grid-template-columns:1fr; } }
  .col{ border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,.02); display:flex; flex-direction:column; min-height:160px; }
  .col.dropok{ outline:2px dashed rgba(255,255,255,.35); outline-offset:-4px; }
  .colHead{ padding:10px 12px; font-weight:900; letter-spacing:.6px; text-transform:uppercase; font-size:13px; border-radius:14px 14px 0 0; display:flex; justify-content:space-between; align-items:center; }
  .col.morning   .colHead{ background:var(--m-bar); color:#fff; }
  .col.afternoon .colHead{ background:var(--p-bar); color:#1b1300; }
  .col.absent    .colHead{ background:var(--a-bar); color:#330000; }
  .colHead .n{ font-size:12px; font-weight:800; opacity:.9; }
  .colBody{ padding:10px; display:flex; flex-direction:column; gap:8px; flex:1; }

  .deptGroup{ border:1px dashed var(--line); border-radius:10px; padding:6px 8px 8px; }
  .deptName{ font-size:11px; font-weight:800; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; margin:2px 2px 6px; }
  .deptBadges{ display:flex; flex-direction:column; gap:6px; }
  .colEmpty{ color:var(--muted); font-size:12px; padding:16px 4px; text-align:center; }

  /* ===== Badge ===== */
  .badge{ border:1px solid var(--line); border-radius:11px; background:rgba(0,0,0,.18); padding:7px 9px; cursor:grab; user-select:none; }
  .badge:active{ cursor:grabbing; }
  .badge.dragging{ opacity:.45; }
  .badge.leader{ border-width:2px; border-color:#e6edf3; }
  .badge.open{ background:rgba(255,255,255,.05); }
  .col.morning   .badge{ border-left:3px solid var(--m-bar); }
  .col.afternoon .badge{ border-left:3px solid var(--p-bar); }
  .col.absent    .badge{ border-left:3px solid var(--a-bar); }
  .badgeHead{ display:flex; align-items:center; gap:8px; }
  .badgeName{ font-weight:800; font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge.isAbsent .badgeName{ color:var(--a-bar); }
  .chip{ font-size:10px; font-weight:800; padding:1px 6px; border-radius:999px; border:1px solid currentColor; white-space:nowrap; }
  .chip.ct{ color:#ffd36a; }
  .chip.del{ color:#7fd1ff; }
  .chip.star{ color:#e6edf3; border:none; padding:0; font-size:12px; }
  .badgeStatus{ font-size:11px; color:var(--muted); margin-top:2px; }
  .badgeNote{ font-size:11px; color:#cfe0f0; margin-top:2px; overflow-wrap:anywhere; }

  /* ===== Inline editor ===== */
  .editor{ margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); display:flex; flex-direction:column; gap:7px; }
  .editor .erow{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .editor select, .editor input{ font-size:12px; padding:5px 7px; }
  .editor .grow{ flex:1; min-width:0; }
  .editor label.ctlab{ display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); cursor:pointer; }
  .moveBtns{ display:flex; gap:5px; flex-wrap:wrap; }
  .moveBtns button{ font-size:11px; padding:4px 8px; }
  .moveBtns button.cur{ outline:2px solid rgba(255,255,255,.4); }
  .anaBox{ border-top:1px dashed var(--line); padding-top:7px; display:flex; flex-direction:column; gap:6px; }
  .anaBox .erow select{ flex:1; }

  /* ===== Add worker ===== */
  .addbox{ margin:0 16px 24px; border:1px dashed var(--line); border-radius:12px; padding:12px; background:rgba(255,255,255,.02); }
  .addgrid{ display:grid; grid-template-columns:1.6fr 1fr .8fr .8fr auto; gap:8px; align-items:end; }
  @media (max-width: 760px){ .addgrid{ grid-template-columns:1fr; } }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field span{ font-size:11px; color:var(--muted); }

  .status{ padding:6px 16px; font-size:12px; color:var(--muted); }
  .status b{ color:var(--ok); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Presenze Divisione — Settimanale</h1>
    <div class="small muted">Trascina i badge tra Mattina, Pomeriggio e Assenti. Salvataggio automatico.</div>
  </div>
  <div class="weeknav">
    <button id="prevWk" class="ghost" title="Settimana precedente">◀</button>
    <div class="wklabel" id="wkLabel">—</div>
    <button id="nextWk" class="ghost" title="Settimana successiva">▶</button>
    <button id="todayBtn" class="ghost" title="Vai a oggi">Oggi</button>
  </div>
  <div class="toolbar">
    <button id="saveBtn" class="primary">Salva (JSON)</button>
    <button id="loadBtn">Carica (JSON)</button>
    <input id="fileInput" type="file" accept=".json,application/json" class="hidden" />
    <button id="resetBtn" class="danger" title="Svuota le scelte della settimana">Reset settimana</button>
  </div>
</header>

<div class="daytabs" id="dayTabs"></div>
<div class="board" id="board"></div>

<div class="addbox">
  <div class="small" style="font-weight:800; margin-bottom:8px;">Aggiungi operaio</div>
  <div class="addgrid">
    <label class="field"><span>Nome e cognome</span><input id="addName" type="text" placeholder="Mario Rossi" /></label>
    <label class="field"><span>Reparto</span><select id="addDept"></select></label>
    <label class="field"><span>Squadra</span><select id="addTeam"><option value="A">A</option><option value="B">B</option></select></label>
    <label class="field"><span>Leader</span><select id="addLeader"><option value="0">No</option><option value="1">Sì</option></select></label>
    <button id="addBtn" class="primary">Aggiungi</button>
  </div>
</div>

<div class="status">Stato: <b id="jsStatus">—</b> <span id="ioStatus" class="muted"></span></div>

<script>
(() => {
"use strict";

/* ====== Costanti ====== */
const DEPTS = [
  { id:"U", name:"REVISIONE",    type:"single" },
  { id:"A", name:"PRESTAMPA",    type:"two" },
  { id:"B", name:"STAMPA",       type:"two" },
  { id:"C", name:"ALLESTIMENTO", type:"two" },
];
const STATUS = [
  { id:"PRESENTE",              label:"Presente" },
  { id:"DELOCALIZZATO",         label:"Delocalizzato" },
  { id:"TELELAVORO",            label:"Telelavoro" },
  { id:"ENTRATA_RITARDATA",     label:"Entrata ritardata" },
  { id:"USCITA_ANTICIPATA",     label:"Uscita anticipata" },
  { id:"TURNO_G192",            label:"Turno G192" },
  { id:"MALATTIA",              label:"Malattia" },
  { id:"LEGGE_104",             label:"Legge 104" },
  { id:"CONGEDO_ORDINARIO",     label:"Congedo ordinario" },
  { id:"CONGEDO_SETTIMANALE",   label:"Congedo settimanale" },
  { id:"CONGEDO_GIORNALIERO",   label:"Congedo giornaliero" },
  { id:"CONGEDO_STRAORDINARIO", label:"Congedo straordinario" },
];
const ABSENT = new Set(["MALATTIA","LEGGE_104","CONGEDO_ORDINARIO","CONGEDO_SETTIMANALE","CONGEDO_GIORNALIERO","CONGEDO_STRAORDINARIO"]);
const SHIFTS = [
  { id:"morning",   label:"Mattina" },
  { id:"afternoon", label:"Pomeriggio" },
  { id:"absent",    label:"Assenti" },
];
const DOW = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const MON = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

const STORE_WORKERS = "presenze_divisione_workers_v2";
const STORE_WEEK    = "presenze_divisione_week_v2";

/* ====== Stato ====== */
let data = { workers:[], week:{} };
window.data = data;
let activeISO = toISO(new Date());
let expandedId = null;
let dragId = null;

/* ====== Util ====== */
const $ = id => document.getElementById(id);
function pad(n){ return String(n).padStart(2,"0"); }
function toISO(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fromISO(s){ return new Date(s + "T00:00:00"); }
function uuid(){ return "id_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16); }
function normName(s){ return String(s ?? "").trim().replace(/\s+/g," "); }
function clamp(s,n){ const t=String(s ?? ""); return t.length>n ? t.slice(0,n) : t; }
function deptById(id){ return DEPTS.find(d => d.id === id); }
function statusLabel(id){ return (STATUS.find(s => s.id === id)?.label) || id; }
function isAbsentStatus(st){ return ABSENT.has(st); }

function mondayOf(d){ const x=new Date(d); const k=(x.getDay()+6)%7; x.setDate(x.getDate()-k); x.setHours(0,0,0,0); return x; }
function weekDates(d){ const m=mondayOf(d); return Array.from({length:7},(_,i)=>{ const x=new Date(m); x.setDate(m.getDate()+i); return x; }); }
function getISOWeekKey(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dn=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const wn=Math.ceil((((d-ys)/86400000)+1)/7);
  return `${d.getUTCFullYear()}-W${pad(wn)}`;
}
function getISOWeekNumber(date){ return parseInt(getISOWeekKey(date).split("W")[1],10); }
function isEvenWeek(date){ return (getISOWeekNumber(date)%2)===0; }
/* Alternanza: settimana pari -> mattina A, dispari -> mattina B */
function isMorningTeam(team,date){ return team === (isEvenWeek(date) ? "A" : "B"); }
function effectiveTeam(worker,rec){ return rec?.swapTeam ? (worker.baseTeam==="A"?"B":"A") : worker.baseTeam; }
function autoWorkShift(worker,rec,date){
  const dept=deptById(worker.deptId);
  if(!dept || dept.type==="single") return "morning";
  return isMorningTeam(effectiveTeam(worker,rec),date) ? "morning" : "afternoon";
}
/* Turno effettivo: manuale (rec.shift) ha priorità, altrimenti automatico */
function effShift(worker,rec,date){
  if(rec.shift) return rec.shift;
  if(isAbsentStatus(rec.status||"PRESENTE")) return "absent";
  return autoWorkShift(worker,rec,date);
}

/* ====== Storage (autosave) ====== */
function loadStore(key){ try{ const r=localStorage.getItem(key); return r ? JSON.parse(r) : null; }catch{ return null; } }
function saveWorkers(){ try{ localStorage.setItem(STORE_WORKERS, JSON.stringify(data.workers)); }catch{} }
function saveWeek(){ try{ localStorage.setItem(STORE_WEEK, JSON.stringify(data.week)); }catch{} }

/* ====== Day record ====== */
function ensureDay(weekKey,iso){
  if(!data.week[weekKey]) data.week[weekKey] = { days:{} };
  if(!data.week[weekKey].days[iso]) data.week[weekKey].days[iso] = {};
}
function getRec(weekKey,iso,wid){
  ensureDay(weekKey,iso);
  return data.week[weekKey].days[iso][wid] || { status:"PRESENTE", swapTeam:false, note:"", shift:null };
}
function setRec(weekKey,iso,wid,patch){
  ensureDay(weekKey,iso);
  const cur = getRec(weekKey,iso,wid);
  data.week[weekKey].days[iso][wid] = { ...cur, ...patch };
  saveWeek();
}

/* ====== JSON import/export ====== */
function ioMsg(m){ const e=$("ioStatus"); if(e) e.textContent = m ? ("· " + m) : ""; }
function downloadJson(filename,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },200);
}
function exportJson(){
  const workers = data.workers.map(w=>({
    id:String(w.id||uuid()), name:normName(w.name||""),
    deptId:String(w.deptId||"A").toUpperCase(),
    baseTeam:(String(w.baseTeam||"A").toUpperCase()==="B")?"B":"A",
    isLeader:!!w.isLeader
  }));
  downloadJson("presenze_data.json", { version:2, exportedAt:new Date().toISOString(), workers, week:data.week||{} });
  ioMsg("salvato presenze_data.json");
}
async function importJson(file){
  let obj;
  try{ obj = JSON.parse(await file.text()); }
  catch(e){ throw new Error("JSON non valido: " + (e?.message||e)); }
  if(!obj || typeof obj!=="object" || !Array.isArray(obj.workers)) throw new Error("File non valido (manca 'workers').");
  data.workers = obj.workers.map(w=>({
    id:String(w.id||uuid()), name:normName(w.name||""),
    deptId:String(w.deptId||"A").toUpperCase(),
    baseTeam:(String(w.baseTeam||"A").toUpperCase()==="B")?"B":"A",
    isLeader:!!w.isLeader
  })).filter(w=>w.name && ["U","A","B","C"].includes(w.deptId));
  data.week = (obj.week && typeof obj.week==="object") ? obj.week : {};
  saveWorkers(); saveWeek(); render();
  ioMsg("dati caricati");
}

/* ====== Move / mutations ====== */
function moveWorker(wid,shift){
  const date=fromISO(activeISO), wk=getISOWeekKey(date);
  const rec=getRec(wk,activeISO,wid);
  const patch={ shift };
  // Spostando in un turno lavorativo, se lo stato è di assenza lo riporto a Presente
  if(shift!=="absent" && isAbsentStatus(rec.status||"PRESENTE")) patch.status="PRESENTE";
  setRec(wk,activeISO,wid,patch);
  render();
}
function changeStatus(wid,status){
  const date=fromISO(activeISO), wk=getISOWeekKey(date);
  const worker=data.workers.find(w=>w.id===wid);
  const rec=getRec(wk,activeISO,wid);
  const patch={ status };
  if(isAbsentStatus(status)) patch.shift="absent";
  else if(rec.shift==="absent") patch.shift=autoWorkShift(worker,rec,date); // torna in turno
  setRec(wk,activeISO,wid,patch);
  render();
}

/* ====== Render ====== */
function render(){
  renderWeekLabel();
  renderDayTabs();
  renderBoard();
  $("jsStatus").textContent = "OK";
}

function renderWeekLabel(){
  const days=weekDates(fromISO(activeISO));
  const a=days[0], b=days[6];
  const wk=getISOWeekKey(fromISO(activeISO));
  const range = `${a.getDate()} ${MON[a.getMonth()]} – ${b.getDate()} ${MON[b.getMonth()]} ${b.getFullYear()}`;
  $("wkLabel").innerHTML = `Settimana ${wk}<br><span class="small muted">${range}</span>`;
}

function renderDayTabs(){
  const wrap=$("dayTabs"); wrap.innerHTML="";
  const days=weekDates(fromISO(activeISO));
  const todayISO=toISO(new Date());
  days.forEach((d,i)=>{
    const iso=toISO(d), wk=getISOWeekKey(d);
    const absent=data.workers.reduce((n,w)=>{
      const rec=getRec(wk,iso,w.id);
      return n + (effShift(w,rec,d)==="absent" ? 1 : 0);
    },0);
    const btn=document.createElement("button");
    btn.className="daytab" + (iso===activeISO?" active":"") + (iso===todayISO?" today":"");
    btn.innerHTML=`${DOW[i]}<b>${d.getDate()} ${MON[d.getMonth()]}</b><span class="cnt">${absent?("ass: "+absent):"&nbsp;"}</span>`;
    btn.addEventListener("click",()=>{ activeISO=iso; expandedId=null; render(); });
    wrap.appendChild(btn);
  });
}

function sortLeaderFirst(list){
  return list.slice().sort((a,b)=>{
    const al=a.worker.isLeader?0:1, bl=b.worker.isLeader?0:1;
    if(al!==bl) return al-bl;
    return a.worker.name.localeCompare(b.worker.name,"it");
  });
}

function renderBoard(){
  const board=$("board"); board.innerHTML="";
  const date=fromISO(activeISO), wk=getISOWeekKey(date);

  // classifica ogni operaio nel turno effettivo
  const buckets={ morning:[], afternoon:[], absent:[] };
  for(const w of data.workers){
    const rec=getRec(wk,activeISO,w.id);
    const sh=effShift(w,rec,date);
    buckets[sh].push({ worker:w, rec });
  }

  for(const sh of SHIFTS){
    const col=document.createElement("div");
    col.className="col "+sh.id;
    col.dataset.shift=sh.id;

    const head=document.createElement("div");
    head.className="colHead";
    head.innerHTML=`<span>${sh.label}</span><span class="n">${buckets[sh.id].length}</span>`;
    col.appendChild(head);

    const body=document.createElement("div");
    body.className="colBody";

    if(!buckets[sh.id].length){
      const e=document.createElement("div"); e.className="colEmpty"; e.textContent="— trascina qui —";
      body.appendChild(e);
    }else{
      // raggruppati per reparto
      for(const d of DEPTS){
        const inDept=buckets[sh.id].filter(x=>x.worker.deptId===d.id);
        if(!inDept.length) continue;
        const grp=document.createElement("div"); grp.className="deptGroup";
        const nm=document.createElement("div"); nm.className="deptName"; nm.textContent=d.name;
        grp.appendChild(nm);
        const bb=document.createElement("div"); bb.className="deptBadges";
        for(const item of sortLeaderFirst(inDept)) bb.appendChild(buildBadge(item.worker,item.rec,sh.id,date));
        grp.appendChild(bb);
        body.appendChild(grp);
      }
    }
    col.appendChild(body);
    board.appendChild(col);
  }
}

function buildBadge(worker,rec,curShift,date){
  const st=rec.status||"PRESENTE";
  const isAbs=isAbsentStatus(st);
  const isDel=(st==="DELOCALIZZATO"||st==="TELELAVORO");
  const isCT=!!rec.swapTeam || st==="TURNO_G192";
  const open=expandedId===worker.id;

  const el=document.createElement("div");
  el.className="badge"+(worker.isLeader?" leader":"")+(isAbs?" isAbsent":"")+(open?" open":"");
  el.draggable=true;
  el.dataset.id=worker.id;

  // head
  const head=document.createElement("div"); head.className="badgeHead";
  if(worker.isLeader){ const s=document.createElement("span"); s.className="chip star"; s.textContent="★"; head.appendChild(s); }
  const nm=document.createElement("span"); nm.className="badgeName"; nm.textContent=worker.name; head.appendChild(nm);
  if(isCT){ const c=document.createElement("span"); c.className="chip ct"; c.textContent="CT"; head.appendChild(c); }
  if(isDel){ const c=document.createElement("span"); c.className="chip del"; c.textContent="DEL"; head.appendChild(c); }
  head.addEventListener("click",()=>{ expandedId=open?null:worker.id; render(); });
  el.appendChild(head);

  if(st!=="PRESENTE"){ const s=document.createElement("div"); s.className="badgeStatus"; s.textContent=statusLabel(st); el.appendChild(s); }
  if((rec.note||"").trim()){ const n=document.createElement("div"); n.className="badgeNote"; n.textContent=rec.note.trim(); el.appendChild(n); }

  if(open) el.appendChild(buildEditor(worker,rec,curShift,date));
  return el;
}

function buildEditor(worker,rec,curShift,date){
  const wk=getISOWeekKey(date);
  const ed=document.createElement("div"); ed.className="editor";
  const stop=e=>e.stopPropagation();
  ed.addEventListener("click",stop);
  ed.draggable=false;
  ed.addEventListener("mousedown",e=>e.stopPropagation());

  // stato + CT
  const r1=document.createElement("div"); r1.className="erow";
  const sel=document.createElement("select"); sel.className="grow";
  for(const s of STATUS){ const o=document.createElement("option"); o.value=s.id; o.textContent=s.label; if(s.id===(rec.status||"PRESENTE")) o.selected=true; sel.appendChild(o); }
  sel.addEventListener("change",()=>changeStatus(worker.id,sel.value));
  const ctl=document.createElement("label"); ctl.className="ctlab";
  const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!rec.swapTeam;
  cb.addEventListener("change",()=>{ setRec(wk,activeISO,worker.id,{swapTeam:cb.checked}); render(); });
  ctl.appendChild(cb); ctl.appendChild(document.createTextNode("CT (cambio turno)"));
  r1.appendChild(sel); r1.appendChild(ctl); ed.appendChild(r1);

  // note
  const note=document.createElement("input"); note.type="text"; note.className="grow"; note.placeholder="Note…"; note.maxLength=50; note.value=rec.note||"";
  note.addEventListener("input",()=>setRec(wk,activeISO,worker.id,{note:clamp(note.value,50)}));
  const r2=document.createElement("div"); r2.className="erow"; r2.appendChild(note); ed.appendChild(r2);

  // sposta (fallback al drag, utile su touch)
  const mv=document.createElement("div"); mv.className="moveBtns";
  for(const s of SHIFTS){
    const b=document.createElement("button"); b.type="button"; b.textContent=s.label;
    if(s.id===curShift) b.classList.add("cur");
    b.addEventListener("click",()=>moveWorker(worker.id,s.id));
    mv.appendChild(b);
  }
  ed.appendChild(mv);

  // anagrafica
  const ana=document.createElement("div"); ana.className="anaBox";
  const nameInp=document.createElement("input"); nameInp.type="text"; nameInp.className="grow"; nameInp.value=worker.name; nameInp.maxLength=40; nameInp.placeholder="Nome";
  nameInp.addEventListener("input",()=>{ worker.name=normName(nameInp.value); saveWorkers(); });
  nameInp.addEventListener("blur",()=>render());
  const ar0=document.createElement("div"); ar0.className="erow"; ar0.appendChild(nameInp); ana.appendChild(ar0);

  const deptSel=document.createElement("select");
  for(const d of DEPTS){ const o=document.createElement("option"); o.value=d.id; o.textContent=d.name; if(d.id===worker.deptId) o.selected=true; deptSel.appendChild(o); }
  deptSel.addEventListener("change",()=>{ worker.deptId=deptSel.value; saveWorkers(); render(); });
  const teamSel=document.createElement("select");
  teamSel.innerHTML='<option value="A">Squadra A</option><option value="B">Squadra B</option>'; teamSel.value=worker.baseTeam;
  teamSel.addEventListener("change",()=>{ worker.baseTeam=teamSel.value; saveWorkers(); render(); });
  const leadSel=document.createElement("select");
  leadSel.innerHTML='<option value="0">Leader: No</option><option value="1">Leader: Sì</option>'; leadSel.value=worker.isLeader?"1":"0";
  leadSel.addEventListener("change",()=>{ worker.isLeader=(leadSel.value==="1"); saveWorkers(); render(); });
  const ar1=document.createElement("div"); ar1.className="erow"; ar1.appendChild(deptSel); ar1.appendChild(teamSel); ana.appendChild(ar1);
  const ar2=document.createElement("div"); ar2.className="erow"; ar2.appendChild(leadSel);
  const del=document.createElement("button"); del.type="button"; del.className="danger"; del.textContent="Elimina";
  del.addEventListener("click",()=>{
    if(!confirm("Eliminare "+worker.name+"?")) return;
    data.workers=data.workers.filter(w=>w.id!==worker.id);
    for(const k of Object.keys(data.week)){
      const days=data.week[k]?.days||{};
      for(const di of Object.keys(days)){ if(days[di]?.[worker.id]) delete days[di][worker.id]; }
    }
    if(expandedId===worker.id) expandedId=null;
    saveWorkers(); saveWeek(); render();
  });
  ar2.appendChild(del); ana.appendChild(ar2);
  ed.appendChild(ana);

  return ed;
}

/* ====== Drag & Drop (delegato sul board) ====== */
function setupDnD(){
  const board=$("board");
  board.addEventListener("dragstart",e=>{
    const b=e.target.closest(".badge"); if(!b) return;
    dragId=b.dataset.id;
    e.dataTransfer.effectAllowed="move";
    try{ e.dataTransfer.setData("text/plain",dragId); }catch{}
    b.classList.add("dragging");
  });
  board.addEventListener("dragend",e=>{
    const b=e.target.closest(".badge"); if(b) b.classList.remove("dragging");
    board.querySelectorAll(".col.dropok").forEach(c=>c.classList.remove("dropok"));
    dragId=null;
  });
  board.addEventListener("dragover",e=>{
    const col=e.target.closest(".col"); if(!col) return;
    e.preventDefault(); e.dataTransfer.dropEffect="move";
    board.querySelectorAll(".col.dropok").forEach(c=>{ if(c!==col) c.classList.remove("dropok"); });
    col.classList.add("dropok");
  });
  board.addEventListener("dragleave",e=>{
    const col=e.target.closest(".col");
    if(col && !col.contains(e.relatedTarget)) col.classList.remove("dropok");
  });
  board.addEventListener("drop",e=>{
    const col=e.target.closest(".col"); if(!col) return;
    e.preventDefault();
    const id=dragId || (()=>{ try{ return e.dataTransfer.getData("text/plain"); }catch{ return null; } })();
    col.classList.remove("dropok");
    if(id) moveWorker(id,col.dataset.shift);
  });
}

/* ====== Aggiungi operaio ====== */
function fillAddMenus(){
  const ad=$("addDept"); ad.innerHTML="";
  for(const d of DEPTS){ const o=document.createElement("option"); o.value=d.id; o.textContent=d.name; if(d.id==="A") o.selected=true; ad.appendChild(o); }
}
function addWorker(){
  const name=normName($("addName").value);
  if(!name){ alert("Inserisci un nome."); return; }
  data.workers.push({ id:uuid(), name, deptId:$("addDept").value, baseTeam:$("addTeam").value, isLeader:$("addLeader").value==="1" });
  saveWorkers();
  $("addName").value="";
  render();
}

/* ====== Reset settimana ====== */
function resetWeek(){
  const wk=getISOWeekKey(fromISO(activeISO));
  if(!confirm("Svuotare le scelte della settimana "+wk+"? (l'anagrafica resta)")) return;
  delete data.week[wk]; saveWeek(); render();
}

/* ====== Init ====== */
function bootstrap(){
  const w=loadStore(STORE_WORKERS);
  if(Array.isArray(w) && w.length){ data.workers=w; }
  else if(Array.isArray(window.HARD_WORKERS)){
    data.workers=window.HARD_WORKERS.map(x=>({
      id:String(x.id||uuid()), name:normName(x.name||""),
      deptId:String(x.deptId||"A").toUpperCase(),
      baseTeam:(String(x.baseTeam||"A").toUpperCase()==="B")?"B":"A",
      isLeader:!!x.isLeader
    }));
    saveWorkers();
  }
  const wk=loadStore(STORE_WEEK);
  if(wk && typeof wk==="object") data.week=wk;
}

function init(){
  try{
    bootstrap();
    fillAddMenus();
    setupDnD();
    $("prevWk").addEventListener("click",()=>{ const d=fromISO(activeISO); d.setDate(d.getDate()-7); activeISO=toISO(d); expandedId=null; render(); });
    $("nextWk").addEventListener("click",()=>{ const d=fromISO(activeISO); d.setDate(d.getDate()+7); activeISO=toISO(d); expandedId=null; render(); });
    $("todayBtn").addEventListener("click",()=>{ activeISO=toISO(new Date()); expandedId=null; render(); });
    $("saveBtn").addEventListener("click",exportJson);
    $("loadBtn").addEventListener("click",()=>$("fileInput").click());
    $("fileInput").addEventListener("change",async()=>{
      const f=$("fileInput").files?.[0]; if(!f) return;
      try{ await importJson(f); }catch(e){ ioMsg("errore: "+(e?.message||e)); alert("Errore caricamento: "+(e?.message||e)); }
      finally{ $("fileInput").value=""; }
    });
    $("resetBtn").addEventListener("click",resetWeek);
    $("addBtn").addEventListener("click",addWorker);
    $("addName").addEventListener("keydown",e=>{ if(e.key==="Enter") addWorker(); });
    render();
  }catch(e){
    $("jsStatus").textContent="ERRORE";
    ioMsg((e?.stack||e?.message||String(e)));
  }
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();
})();
</script>
